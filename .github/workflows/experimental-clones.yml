name: Experimental Clone Analysis

on:
  workflow_dispatch:

jobs:
  experimental-clones:
    name: Token + AST Clone Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run experimental clone analysis
        shell: pwsh
        run: python scripts/clone_alert.py --paths src --engine all --mode analysis --output target/analysis/clones.json

      - name: Upload clone analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: experimental-clones
          path: target/analysis/clones.json
